name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        run: go vet ./...

      - name: Skill lint
        run: make skill-lint

      # Compile-check the build-tag-gated tests (integration = real AWS ECS,
      # e2e = proxy distribution). They never run in the default suite, so
      # without this they silently rot when the code they call is renamed.
      - name: Vet gated tests (integration, e2e)
        run: go vet -tags "integration e2e" ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -o /tmp/shinyhub ./cmd/shinyhub

  # Remote-worker end-to-end: launches a control plane + a real `shinyhub worker`
  # over mTLS and deploys a Shiny app onto a remote_docker tier (real containers),
  # then exercises bundle-pull dedup, tunnel routing, control-plane restart
  # re-adoption, and worker-kill -> replica-lost -> routing-drop. Its own job
  # because it needs a Docker daemon and runs ~2-3 min (the worker-down heartbeat
  # timeout dominates). ubuntu-latest ships Docker, so no extra setup is needed.
  test-remote-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Remote-worker E2E (Docker)
        run: make test-remote-e2e

  # Zero-downtime handoff end-to-end: builds the binary, sends SIGHUP, and asserts
  # the main + metrics listeners hand off to a successor process with no
  # connection-refused gap. Its own job because it builds and runs the real binary
  # (tableflip cannot re-exec under `go test`); no Docker needed.
  test-handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Zero-downtime handoff E2E
        run: make test-handoff

  # Skill smoke: deploys the deploy-shinyhub skill's example app onto a real
  # server (native runtime) and asserts the proxy serves it (HTTP 200). Guards
  # the skill against drift in CLI flags, env vars, or the deploy flow. Its own
  # job because the example app installs `shiny` via uv on first start (needs uv
  # + network); the make target skips when uv is absent so local runs stay green.
  skill-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Skill smoke (deploy example app)
        run: make skill-smoke
