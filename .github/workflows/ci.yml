name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint
        run: go vet ./...

      - name: Skill lint
        run: make skill-lint

      # Compile-check the build-tag-gated tests (integration = real AWS ECS,
      # e2e = proxy distribution). They never run in the default suite, so
      # without this they silently rot when the code they call is renamed.
      - name: Vet gated tests (integration, e2e)
        run: go vet -tags "integration e2e" ./...

      - name: Test (Go)
        run: make test-go

      # The dashboard SPA is plain JS tested with jsdom; an uncaught throw breaks
      # the whole dashboard, so these tests gate every push too.
      - name: Test (JS)
        run: make test-js

      - name: Vulnerability scan
        run: make vuln

      - name: Build
        run: go build -o /tmp/shinyhub ./cmd/shinyhub

  # Full suite under the race detector. Separate job so the ~3-5x slowdown runs
  # in parallel with the fast feedback of the `test` job.
  test-race:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test (race detector)
        run: make test-race

  # Full Go suite against a throwaway Postgres, so a Postgres-only regression
  # (missing column in the baseline, a wrong-dialect query) is caught in CI
  # rather than only when someone runs `make test-postgres` locally. ubuntu-latest
  # ships Docker, so no extra setup is needed.
  test-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # pg_dump / pg_restore are exercised by the Postgres backup round-trip
      # test (internal/backup). The client major version must be >= the server
      # (postgres:16 in postgres-test.sh); the distro default client meets that
      # and is forward-compatible with newer servers.
      - name: Install PostgreSQL client (pg_dump/pg_restore)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Test (Postgres backend, Docker)
        run: make test-postgres

  # Remote-worker end-to-end: launches a control plane + a real `shinyhub worker`
  # over mTLS and deploys a Shiny app onto a remote_docker tier (real containers),
  # then exercises bundle-pull dedup, tunnel routing, control-plane restart
  # re-adoption, and worker-kill -> replica-lost -> routing-drop. Its own job
  # because it needs a Docker daemon and runs ~2-3 min (the worker-down heartbeat
  # timeout dominates). ubuntu-latest ships Docker, so no extra setup is needed.
  test-remote-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Remote-worker E2E (Docker)
        run: make test-remote-e2e

  # Zero-downtime handoff end-to-end: builds the binary, sends SIGHUP, and asserts
  # the main + metrics listeners hand off to a successor process with no
  # connection-refused gap. Its own job because it builds and runs the real binary
  # (tableflip cannot re-exec under `go test`); no Docker needed.
  test-handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Zero-downtime handoff E2E
        run: make test-handoff

  # Kill-the-active HA failover: two real shinyhub processes against one Postgres;
  # SIGKILL the active and assert the standby keeps serving the same live replica
  # and then acquires the control-plane lease. Its own job because it needs a
  # Docker daemon (throwaway Postgres) and builds + runs the real binary.
  # ubuntu-latest ships Docker, so no extra setup is needed.
  test-ha:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Kill-the-active HA failover (Docker + Postgres)
        run: make test-ha

  # Skill smoke: deploys the deploy-shinyhub skill's example app onto a real
  # server (native runtime) and asserts the proxy serves it (HTTP 200). Guards
  # the skill against drift in CLI flags, env vars, or the deploy flow. Its own
  # job because the example app installs `shiny` via uv on first start (needs uv
  # + network); the make target skips when uv is absent so local runs stay green.
  skill-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Skill smoke (deploy example app)
        run: make skill-smoke

  # Client-side identity-helper tests (Python + R JWT verification against a
  # token minted by the real production MintToken). Security-relevant surface
  # that previously only ran when a developer invoked it locally. uv is
  # installed for the Python helper; the R subtests skip cleanly when Rscript
  # is absent, so no R toolchain is provisioned here.
  test-identity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Identity helper tests
        run: make test-identity

  # Terraform fmt/validate for the AWS ECS IaC. No cloud credentials are needed
  # (init runs with -backend=false), so a syntax/format regression is caught in
  # CI rather than only when someone runs `make iac-validate` locally.
  iac-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt/init/validate
        run: make iac-validate

  # Build the container image and scan it for HIGH/CRITICAL CVEs (base layers +
  # embedded Go binary deps) with Trivy. Complements `make vuln` (Go source).
  # docker is preinstalled on ubuntu-latest, so `make scan-image` runs the scan
  # via the aquasec/trivy container without a separate install step.
  scan-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Build and scan the container image
        run: make scan-image
