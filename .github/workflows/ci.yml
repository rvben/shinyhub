name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: |
          go build -o /tmp/shinyhub ./cmd/shinyhub
          go build -o /tmp/shiny ./cmd/shiny
