name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  checks: read

env:
  # Run JS-based actions (checkout, setup-go, …) on Node 24 instead of the
  # deprecated Node 20 runtime. Drop this once every action ships a Node 24
  # default release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify CI passed on tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SHA="$(git rev-parse HEAD)"
          echo "Checking CI status for commit $SHA"
          STATE="$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" --jq '[.check_runs[] | select(.name=="test")] | .[0].conclusion // "missing"')"
          echo "CI test conclusion: $STATE"
          if [ "$STATE" != "success" ]; then
            echo "CI test job did not succeed on $SHA (got: $STATE). Refusing to release."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wheels:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64, wheel-platform: manylinux_2_17_x86_64 }
          - { goos: linux,  goarch: arm64, wheel-platform: manylinux_2_17_aarch64 }
          - { goos: darwin, goarch: amd64, wheel-platform: macosx_11_0_x86_64 }
          - { goos: darwin, goarch: arm64, wheel-platform: macosx_11_0_arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download binary from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TARBALL="shinyhub_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          mkdir -p /tmp/dl
          gh release download "$TAG" -p "$TARBALL" -D /tmp/dl
          tar -xzf "/tmp/dl/$TARBALL" -C /tmp/dl
          install -m 755 /tmp/dl/shinyhub packaging/python/src/shinyhub/_binary/shinyhub

      - name: Build wheel
        env:
          SHINYHUB_WHEEL_PLATFORM: ${{ matrix.wheel-platform }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build hatchling
          export SHINYHUB_WHEEL_VERSION="${GITHUB_REF_NAME#v}"
          python -m build --wheel packaging/python/

      - name: Smoke-test wheel on native runner
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          set -euo pipefail
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install packaging/python/dist/*.whl
          OUT="$(/tmp/venv/bin/shinyhub --version)"
          echo "Binary reported: $OUT"
          EXPECTED="${GITHUB_REF_NAME#v}"
          echo "$OUT" | grep -q "$EXPECTED" \
            || { echo "shinyhub --version output '$OUT' does not contain '$EXPECTED'"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packaging/python/dist/*.whl
          if-no-files-found: error
          retention-days: 7

  sdist:
    # Source distribution is a stub: no binary, so any wheel built from
    # it on an unsupported platform fails with a clear error message
    # (see packaging/python/hatch_build.py::PlatformTagHook).
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build hatchling
          export SHINYHUB_WHEEL_VERSION="${GITHUB_REF_NAME#v}"
          python -m build --sdist packaging/python/

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: packaging/python/dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/shinyhub/
    permissions:
      id-token: write   # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
