name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write       # cosign keyless signing + SLSA provenance OIDC
  attestations: write   # SLSA build-provenance attestations for binaries + image

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v7
        with:
          node-version: "20"

      # The release is hermetic: it re-runs the full gate against the exact
      # tagged tree rather than trusting a separate workflow's check-run on a
      # racing commit. Same make targets the ci workflow runs, in order.
      - name: Lint
        run: make lint

      - name: Test (Go)
        run: make test-go

      - name: Test (JS)
        run: make test-js

      - name: Vulnerability scan
        run: make vuln

      # Build-provisioning gate: real sandboxed `uv sync` on the corp shape
      # (managed-Python provisioning + private-index env passthrough). The
      # #40/#41 class shipped in releases precisely because no release gate
      # exercised it; this one does, before any artifact is published.
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build-provisioning gate (sandboxed uv sync)
        run: make test-provisioning

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      # syft generates the SPDX SBOMs configured in .goreleaser.yaml (sboms:).
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SLSA build provenance. These run after publish: the artifacts are already
      # released, so an attestation hiccup is re-runnable and never blocks the
      # release itself. GoReleaser strips the leading v, so the image tag is the
      # bare version.
      - name: Resolve published image digest
        id: image
        run: |
          ref="ghcr.io/rvben/shinyhub:${GITHUB_REF_NAME#v}"
          digest=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest release binaries (SLSA provenance)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/shinyhub_*.tar.gz
            dist/checksums.txt

      - name: Attest container image (SLSA provenance)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/rvben/shinyhub
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

  wheels:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64, wheel-platform: manylinux_2_17_x86_64 }
          - { goos: linux,  goarch: arm64, wheel-platform: manylinux_2_17_aarch64 }
          - { goos: darwin, goarch: amd64, wheel-platform: macosx_11_0_x86_64 }
          - { goos: darwin, goarch: arm64, wheel-platform: macosx_11_0_arm64 }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Download binary from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TARBALL="shinyhub_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          mkdir -p /tmp/dl
          gh release download "$TAG" -p "$TARBALL" -D /tmp/dl
          tar -xzf "/tmp/dl/$TARBALL" -C /tmp/dl
          install -m 755 /tmp/dl/shinyhub packaging/python/src/shinyhub/_binary/shinyhub

      - name: Build wheel
        env:
          SHINYHUB_WHEEL_PLATFORM: ${{ matrix.wheel-platform }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build hatchling
          export SHINYHUB_WHEEL_VERSION="${GITHUB_REF_NAME#v}"
          python -m build --wheel packaging/python/

      - name: Smoke-test wheel on native runner
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          set -euo pipefail
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install packaging/python/dist/*.whl
          OUT="$(/tmp/venv/bin/shinyhub --version)"
          echo "Binary reported: $OUT"
          EXPECTED="${GITHUB_REF_NAME#v}"
          echo "$OUT" | grep -q "$EXPECTED" \
            || { echo "shinyhub --version output '$OUT' does not contain '$EXPECTED'"; exit 1; }

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: packaging/python/dist/*.whl
          if-no-files-found: error
          retention-days: 7

  sdist:
    # Source distribution is a stub: no binary, so any wheel built from
    # it on an unsupported platform fails with a clear error message
    # (see packaging/python/hatch_build.py::PlatformTagHook).
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build hatchling
          export SHINYHUB_WHEEL_VERSION="${GITHUB_REF_NAME#v}"
          python -m build --sdist packaging/python/

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: packaging/python/dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/shinyhub/
    permissions:
      id-token: write   # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # Publish the app-facing SDK, shinyhub-identity: the pure-Python helper a Shiny/
  # Streamlit/Dash app imports to read its forwarded identity (docs/identity.md).
  # It is deliberately a SEPARATE package from `shinyhub` - the main wheel bundles
  # a ~90MB Go binary that an app must never drag into its runtime, and the helper
  # is versioned independently in packaging/python-identity/pyproject.toml.
  # skip-existing makes this idempotent: it publishes only when that version bumps;
  # a re-run on an already-published version is a no-op, so it can ride every tag.
  identity-helper:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/shinyhub-identity/
    permissions:
      id-token: write   # PyPI trusted publishing
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build shinyhub-identity
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          python -m build packaging/python-identity/

      - name: Verify the built wheel installs and passes its tests
        run: |
          set -euo pipefail
          python -m venv /tmp/id-venv
          /tmp/id-venv/bin/pip install --upgrade pip pytest
          /tmp/id-venv/bin/pip install packaging/python-identity/dist/*.whl
          /tmp/id-venv/bin/python -c "from shinyhub_identity import current_user; print('import ok')"
          /tmp/id-venv/bin/pytest packaging/python-identity/tests/ -q

      - name: Publish to PyPI (skip if version already exists)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packaging/python-identity/dist
          skip-existing: true
