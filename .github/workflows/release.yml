name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  checks: read

env:
  # Run JS-based actions (checkout, setup-go, …) on Node 24 instead of the
  # deprecated Node 20 runtime. Drop this once every action ships a Node 24
  # default release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify CI passed on tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SHA="$(git rev-parse HEAD)"
          echo "Checking CI status for commit $SHA"
          STATE="$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" --jq '[.check_runs[] | select(.name=="test")] | .[0].conclusion // "missing"')"
          echo "CI test conclusion: $STATE"
          if [ "$STATE" != "success" ]; then
            echo "CI test job did not succeed on $SHA (got: $STATE). Refusing to release."
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
