<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShinyHub</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <nav>
    <span class="brand">ShinyHub</span>
    <span id="session-user" class="session-user"></span>
    <button id="logout-button" type="button" hidden>Logout</button>
  </nav>

  <main>
    <section id="login-view">
      <div class="login-box">
        <h2>Sign in</h2>
        <form id="login-form">
          <input id="login-username" placeholder="Username" type="text" autocomplete="username" required>
          <input id="login-password" placeholder="Password" type="password" autocomplete="current-password" required>
          <button type="submit">Login</button>
        </form>
        <p id="login-error" class="error" hidden></p>
        <div class="login-separator">or</div>
        <a class="github-login" href="/api/auth/github/login">Login with GitHub</a>
      </div>
    </section>

    <section id="apps-view" hidden>
      <div class="toolbar">
        <h1>Apps</h1>
        <button id="refresh-button" type="button">Refresh</button>
      </div>
      <p id="app-error" class="error" hidden></p>
      <div id="app-grid" class="app-grid"></div>
      <p id="empty-state" class="empty-state" hidden>No apps deployed yet.</p>
    </section>

  <!-- Log pane: hidden overlay that shows SSE log output for one app -->
  <div id="log-pane" class="log-pane" hidden>
    <div class="log-pane-header">
      <span id="log-pane-title" class="log-pane-title"></span>
      <button id="log-pane-close" type="button">Close</button>
    </div>
    <pre id="log-pane-body" class="log-pane-body"></pre>
  </div>
  </main>
</body>
</html>
