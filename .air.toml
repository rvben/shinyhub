root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/shinyhub ./cmd/shinyhub"
  bin = "./tmp/shinyhub"
  full_bin = "SHINYHUB_DEV_STATIC=./internal/ui/static SHINYHUB_AUTH_SECRET=dev-secret-do-not-use-in-production SHINYHUB_LOG_FORMAT=text SHINYHUB_ADMIN_USER=admin SHINYHUB_ADMIN_PASSWORD=admin ./tmp/shinyhub"
  include_ext = ["go"]
  exclude_dir = [
    "bin",
    "tmp",
    "data",
    "docs",
    ".worktrees",
    ".git",
    ".github",
    ".superpowers",
    "internal/ui/static",
  ]
  exclude_regex = ["_test\\.go$"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = true

[misc]
  clean_on_exit = true
