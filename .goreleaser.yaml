version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: shinyhub
    main: ./cmd/shinyhub
    binary: shinyhub
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: shiny
    main: ./cmd/shiny
    binary: shiny
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/rvben/shinyhub/cli.version={{.Version}}

archives:
  - id: combined
    ids: [shinyhub, shiny]
    name_template: "shinyhub_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: rvben
    name: shinyhub
  draft: false
  prerelease: auto

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore\\(release\\)"
      - "^style"
