version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: shinyhub
    main: ./cmd/shinyhub
    binary: shinyhub
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: shinyhub
    ids: [shinyhub]
    name_template: "shinyhub_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Software bill of materials, one SPDX JSON document per release archive, built
# with syft. Uploaded as release assets alongside the archives so consumers can
# audit the dependency set of each binary. Requires syft on PATH.
sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact}.sbom.spdx.json"

# Keyless (Sigstore) signature over checksums.txt. Identity is bound to this
# repo's release workflow + tag; install.sh verifies it when cosign is present.
signs:
  - cmd: cosign
    artifacts: checksum
    # cosign 3 (installed by cosign-installer v4) defaults to the Sigstore
    # bundle format: one file carrying the signature and the certificate, and
    # --output-signature / --output-certificate are ignored under it. scripts/
    # install.sh verifies this bundle and still falls back to the old detached
    # pair for releases published before the switch.
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"
    output: true

release:
  github:
    owner: rvben
    name: shinyhub
  draft: false
  prerelease: auto

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore\\(release\\)"
      - "^style"

dockers:
  - id: shinyhub-amd64
    ids: [shinyhub]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    extra_files:
      - shinyhub.yaml.example
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/rvben/shinyhub"
      - "--label=org.opencontainers.image.licenses=MIT"

  - id: shinyhub-arm64
    ids: [shinyhub]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    extra_files:
      - shinyhub.yaml.example
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/rvben/shinyhub"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/rvben/shinyhub:{{ .Version }}"
    image_templates:
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-amd64"
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-arm64"
  - name_template: "ghcr.io/rvben/shinyhub:latest"
    image_templates:
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-amd64"
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-arm64"
