version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: shinyhub
    main: ./cmd/shinyhub
    binary: shinyhub
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: shiny
    main: ./cmd/shiny
    binary: shiny
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/rvben/shinyhub/cli.version={{.Version}}

archives:
  - id: combined
    ids: [shinyhub, shiny]
    name_template: "shinyhub_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: rvben
    name: shinyhub
  draft: false
  prerelease: auto

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^chore\\(release\\)"
      - "^style"

dockers:
  - id: shinyhub-amd64
    ids: [shinyhub]
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    extra_files:
      - shinyhub.yaml.example
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/rvben/shinyhub"
      - "--label=org.opencontainers.image.licenses=MIT"

  - id: shinyhub-arm64
    ids: [shinyhub]
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    extra_files:
      - shinyhub.yaml.example
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/rvben/shinyhub"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/rvben/shinyhub:{{ .Version }}"
    image_templates:
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-amd64"
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-arm64"
  - name_template: "ghcr.io/rvben/shinyhub:latest"
    image_templates:
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-amd64"
      - "ghcr.io/rvben/shinyhub:{{ .Version }}-arm64"
