# Dependencies that must not be bumped automatically.

[pin]
# sigstore/cosign-installer publishes concrete v4.x tags but NO floating `v4`
# ref, unlike its `v2` and `v3`. An updater that shortens the latest version to
# a major (`@v4`) writes a reference that does not resolve, which fails the
# release workflow at the signing step - after the tag is already pushed, and
# invisibly to CI, because this action runs only during a release.
#
# Held at a concrete version for that reason, not to avoid the major: the
# goreleaser signing config was migrated to cosign 3's bundle format in
# v0.10.14, so v4 is the intended version. Bump this deliberately, and check the
# tag resolves (`git ls-remote --tags`) before trusting a shortened form.
"sigstore/cosign-installer" = "v4.1.2"
